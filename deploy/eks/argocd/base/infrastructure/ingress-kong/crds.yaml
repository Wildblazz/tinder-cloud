apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ingressclassparameters.configuration.konghq.com
spec:
  group: configuration.konghq.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                serviceUpstream:
                  type: boolean
                enableLegacyRegexDetection:
                  type: boolean
  scope: Namespaced
  names:
